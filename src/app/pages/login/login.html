<section class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-icon">
        <mat-icon>login</mat-icon>
      </div>
      <mat-card-title>Iniciar Sesion</mat-card-title>
      <mat-card-subtitle>
        Ingresa con tu correo institucional para continuar.
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" (ngSubmit)="login()">
        @if (infoMessage) {
          <div class="login-banner login-banner-info">
            <mat-icon>info</mat-icon>
            <span>{{ infoMessage }}</span>
          </div>
        }

        @if (errorMessage) {
          <div class="login-banner login-banner-error">
            <mat-icon>error</mat-icon>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <mat-form-field appearance="outline">
          <mat-label>Usuario</mat-label>
          <input
            matInput
            type="email"
            [(ngModel)]="usuario"
            (ngModelChange)="errorMessage = ''"
            name="usuario"
            placeholder="usuario@sgt.com"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contrasena</mat-label>
          <input
            matInput
            type="password"
            [(ngModel)]="password"
            (ngModelChange)="errorMessage = ''"
            name="password"
            required
          />
        </mat-form-field>

        <button mat-flat-button type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
